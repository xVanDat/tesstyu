name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download armv7-compatible SDK
        run: |
          mkdir -p theos/sdks
          # Clone theos/sdks - lay SDK co san (co ca armv7)
          git clone --depth 1 https://github.com/theos/sdks.git _sdks
          # Copy tat ca SDK vao thu muc dung
          cp -r _sdks/*.sdk theos/sdks/ 2>/dev/null || true
          rm -rf _sdks
          echo "=== SDKs available ==="
          ls theos/sdks/

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Build .deb
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTCompatTweak-deb
          path: packages/*.deb
          retention-days: 30
