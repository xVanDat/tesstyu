name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download armv7-compatible SDK
        run: |
          # iOS 12.1 la SDK cuoi ho tro armv7 (iPhone 4s/5/5c)
          # Lay tu theos/sdks releases chinh thuc
          mkdir -p theos/sdks

          curl -fsSL \
            "https://github.com/theos/sdks/releases/download/2024-09-08/iPhoneOS12.1.sdk.tar.xz" \
            -o sdk.tar.xz || \
          curl -fsSL \
            "https://github.com/theos/sdks/archive/refs/heads/master.tar.gz" \
            -o sdk.tar.xz

          # Thu giai nen vao sdks/
          if file sdk.tar.xz | grep -q "XZ"; then
            tar -xf sdk.tar.xz -C theos/sdks/
          else
            # La tar.gz (clone archive) - giai nen roi copy SDK phu hop
            mkdir -p _sdks_tmp
            tar -xzf sdk.tar.xz -C _sdks_tmp/ --strip-components=1
            # Tim SDK co armv7 (iOS 12.x tro xuong)
            for sdk in _sdks_tmp/iPhoneOS12*.sdk _sdks_tmp/iPhoneOS11*.sdk _sdks_tmp/iPhoneOS10*.sdk; do
              [ -d "$sdk" ] && cp -r "$sdk" theos/sdks/ && break
            done
          fi

          echo "=== SDKs available ==="
          ls theos/sdks/

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Build .deb
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTCompatTweak-deb
          path: packages/*.deb
          retention-days: 30
