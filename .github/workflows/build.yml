name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download armv7-compatible SDK
        run: |
          mkdir -p theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git _sdks
          cp -r _sdks/*.sdk theos/sdks/
          rm -rf _sdks
          echo "=== SDKs available ==="
          ls theos/sdks/

      - name: Fix SDK module.map (clang moi bat buoc phai la module.modulemap)
        run: |
          SDK="theos/sdks/iPhoneOS12.4.sdk"
          # Tim tat ca file ten "module.map", tao them ban sao ten "module.modulemap"
          find "$SDK" -name "module.map" | while read f; do
            dir=$(dirname "$f")
            if [ ! -f "$dir/module.modulemap" ]; then
              cp "$f" "$dir/module.modulemap"
              echo "Fixed: $f"
            fi
          done

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Build .deb
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTCompatTweak-deb
          path: packages/*.deb
          retention-days: 30
