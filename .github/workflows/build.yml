name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        run: |
          curl -fsSL https://github.com/theos/sdks/archive/refs/heads/master.tar.gz \
            | tar -xz --strip-components=1 \
                  -C theos/sdks \
                  --include="*/iPhoneOS*.sdk" \
                  --include="iPhoneOS*.sdk" \
            2>/dev/null || true

          # Fallback: clone nếu tar filter không support trên runner này
          if [ -z "$(ls theos/sdks/*.sdk 2>/dev/null)" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git _sdks
            cp -r _sdks/*.sdk theos/sdks/
          fi

          echo "SDKs available:"
          ls theos/sdks/

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Build .deb
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTCompatTweak-deb
          path: packages/*.deb
          retention-days: 30
