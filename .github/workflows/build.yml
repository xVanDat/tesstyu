name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download armv7-compatible SDK
        run: |
          mkdir -p theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git _sdks
          # Chi copy iPhoneOS12.4.sdk, khong copy AppleTVOS hay SDK khac
          cp -r _sdks/iPhoneOS12.4.sdk theos/sdks/
          rm -rf _sdks
          echo "=== SDKs available ==="
          ls theos/sdks/

      - name: Fix SDK module.map
        run: |
          find theos/sdks/iPhoneOS12.4.sdk -name "module.map" | while read f; do
            dir=$(dirname "$f")
            [ ! -f "$dir/module.modulemap" ] && cp "$f" "$dir/module.modulemap"
          done

      - name: Set THEOS env
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: |
          git clone https://github.com/ProcursusTeam/ldid.git
          cd ldid
          make
          sudo cp ldid /usr/local/bin/

      - name: Build .deb
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTCompatTweak-deb
          path: packages/*.deb
          retention-days: 30